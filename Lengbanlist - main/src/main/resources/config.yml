prefix: "§f§l[§x§0§8§4§c§f§bL§x§1§9§5§d§f§be§x§2§9§6§d§f§bn§x§3§a§7§e§f§cg§x§4§a§8§f§f§cb§x§5§b§a§0§f§ca§x§6§b§b§0§f§cn§x§7§c§c§1§f§cl§x§8§c§d§2§f§di§x§9§d§e§2§f§ds§x§a§d§f§3§f§dt§f§l]" #插件前缀
sendtime: 5 #以分钟为单位
opensendtime: true #开启循环播报封禁人数
Model: "Default" #当前模型
valid-models: "Default English HuTao Furina Zhongli Keqing Xiao Ayaka Zero Herta" #可用模型
# 功能开关 - 可单独启用或禁用各项功能，被禁用的功能执行时会提示"已被禁用"
features:
  ban: true            # 玩家封禁 /ban, /lban add
  ban-ip: true         # IP封禁 /ban-ip
  unban: true          # 解封 /unban, /lban remove
  warn: true           # 警告 /warn, /lban warn, /warnmsg
  unwarn: true         # 移除警告 /unwarn, /lban unwarn
  check: true          # 查询玩家/IP /check, /lban check
  report: true         # 举报系统 /report
  admin: true          # 管理界面 /admin, /lban admin
  info: true           # 插件信息 /info, /lban info
  kick: true           # 踢出 /kick
  mute: true           # 禁言 /lban mute/unmute/list-mute
  setban: true         # 修改封禁时间 /setban
  history: true        # 查询处罚历史 /history, /lban history
  broadcast: true      # 自动循环播报封禁人数
  chat-filter: true    # 违禁词过滤、自动禁言、可疑消息标记
  getip: true          # 查询玩家IP /lban getip
  model: true          # 模型切换 /lban model
  tp: true             # 传送 /lban tp
  chest-ui: true       # 可视化箱子界面 /lban open
  ip-association: true # IP关联检测，记录玩家历史IP并检测可疑登录
  vpn-detection: true  # VPN/代理检测，自动检测并处理VPN登录
  web: true            # Web管理面板 REST API
  update-check: true  # 检查插件更新
  auto-update: false   # 自动下载更新

# 历史记录保留天数（过期/解封的封禁记录保留N天后自动清理，默认7天）
history-retention-days: 7

# 数据库类型: sqlite 或 mysql
# 旧版本的 yml 会自动按 sqlite 处理，并从旧 YAML 文件迁移数据
database:
  type: "sqlite"
  sqlite:
    file: "lengbanlist.db"
  mysql:
    host: "localhost"
    port: 3306
    database: "lengbanlist"
    username: "root"
    password: "password"

# VPN/代理检测配置
vpn-detection:
  action: "warn"           # 检测到VPN时的处理方式: warn(仅通知), kick(踢出), ban(封禁IP)
  ban-duration: "7d"       # 自动封禁时长（ban模式下）
  ban-reason: "使用代理/VPN登录"  # 自动封禁原因
  kick-message: "请关闭代理或VPN后重新加入游戏"  # 踢出提示信息

# Web管理面板配置
web:
  enabled: false                # 是否启用Web管理面板
  host: "0.0.0.0"              # 监听地址
  port: 8080                    # 监听端口
  jwt-secret: "change-this-to-a-random-secret-key"  # JWT密钥（请修改为随机字符串）
  admin-username: "admin"       # 管理员用户名
  admin-password: "lban123"    # 管理员密码