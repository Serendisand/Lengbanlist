# 插件前缀
prefix: "§f§l[§x§0§8§4§c§f§bL§x§1§9§5§d§f§be§x§2§9§6§d§f§bn§x§3§a§7§e§f§cg§x§4§a§8§f§f§cb§x§5§b§a§0§f§ca§x§6§b§b§0§f§cn§x§7§c§c§1§f§cl§x§8§c§d§2§f§di§x§9§d§e§2§f§ds§x§a§d§f§3§f§dt§f§l]" 
# 广播
opensendtime: true #开启循环播报封禁人数
sendtime: 5 #以分钟为单位
# 模型
Model: "Default" #当前模型

# 功能开关
features:
  ban: false           
  ban-ip: true      
  unban: true       
  warn: true      
  unwarn: true      
  check: true         
  report: true        
  admin: true        
  info: true        
  kick: true         
  mute: true          
  setban: true       
  history: true    
  broadcast: true     
  chat-filter: true    # 违禁词过滤、自动禁言、可疑消息标记
  getip: true        
  model: true      
  tp: true          
  chest-ui: true       
  ip-association: true # IP关联检测
  vpn-detection: true  # VPN/代理检测
  update-check: true  # 检查插件更新
  auto-update: false   # 自动下载更新
  staffchat: true   

# 预设封禁/警告原因
preset-reasons:
  normal: "违规建筑/破坏服务器"
  cheat: "使用外挂/作弊"
  abuse: "言语辱骂/人身攻击"
  spam: "广告/刷屏"        
  grief: "恶意破坏"       

# 历史记录保留天数
history-retention-days: 7

# 数据库类型: sqlite 或 mysql （请直接复制不要自行填）
# 旧版本的 yml 会自动按 sqlite 处理，并从旧 YAML 文件迁移数据
database:
  type: "sqlite"
  sqlite:
    file: "lengbanlist.db"
  mysql:
    host: "localhost"
    port: 3306
    database: "lengbanlist"
    username: "root"
    password: "password"

# VPN/代理检测配置
vpn-detection:
  action: "warn"           # 检测到VPN时的处理方式: warn(仅通知), kick(踢出), ban(封禁IP)
  ban-duration: "7d"       # 自动封禁时长（ban模式下）
  ban-reason: "使用代理/VPN登录"  # 自动封禁原因
  kick-message: "请关闭代理或VPN后重新加入游戏"  # 踢出提示信息

# Web管理面板配置
web:
  enabled: false                # 是否启用Web管理面板
  host: "127.0.0.1"              # 监听地址（127.0.0.1仅本机访问，0.0.0.0允许远程访问）
  port: 8080                    # 监听端口
  jwt-secret: "change-this-to-a-random-secret-key"  # JWT密钥（请修改为随机字符串）
  admin-username: "admin"       # 管理员用户名
  admin-password: "lban123"    # 管理员密码