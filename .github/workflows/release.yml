name: ✨ 构建与发布

on:
  push:
    branches:
      - main

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    if: startsWith(github.event.head_commit.message, 'release')
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        fetch-depth: 0
    
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: maven
    
    - name: Build with Maven
      run: |
        cd "Lengbanlist - main"
        mvn clean package -B -DskipTests
    
    - name: Get version from pom.xml
      id: get_version
      run: |
        cd "Lengbanlist - main"
        VERSION=$(mvn help:evaluate -Dexpression=project.version -q -DforceStdout)
        echo "version=$VERSION" >> $GITHUB_OUTPUT
    
    - name: Find JAR file
      id: find_jar
      run: |
        cd "Lengbanlist - main/target"
        JAR_FILE=$(ls *.jar | grep -v original | head -n 1)
        echo "jar_file=$JAR_FILE" >> $GITHUB_OUTPUT
        echo "jar_path=Lengbanlist - main/target/$JAR_FILE" >> $GITHUB_OUTPUT
    
    - name: Extract release title from commit
      id: release_title
      run: |
        COMMIT_MSG="${{ github.event.head_commit.message }}"
        TITLE=$(echo "$COMMIT_MSG" | sed 's/^release:\s*//i' | head -n 1)
        if [ -z "$TITLE" ]; then
          TITLE="${{ steps.get_version.outputs.version }}"
        fi
        echo "title=$TITLE" >> $GITHUB_OUTPUT
    
    - name: Generate changelog from commits
      id: changelog
      run: |
        LAST_TAG=$(gh release list --limit 1 --json tagName --jq '.[0].tagName' 2>/dev/null || echo "")
        
        if [ -z "$LAST_TAG" ]; then
          echo "No previous release found, collecting all commits"
          COMMITS=$(git log --pretty=format:"%s" --no-merges)
        else
          echo "Previous release tag: $LAST_TAG"
          COMMITS=$(git log ${LAST_TAG}..HEAD --pretty=format:"%s" --no-merges)
        fi
        
        FEATURES=""
        FIXES=""
        IMPROVEMENTS=""
        OTHERS=""
        
        while IFS= read -r line; do
          if [ -z "$line" ]; then continue; fi
          if echo "$line" | grep -qiE '^(feat|add|新增|添加|feature|新功能)'; then
            FEATURES="${FEATURES}• ${line}\n"
          elif echo "$line" | grep -qiE '^(fix|修复|bug|hotfix|修正)'; then
            FIXES="${FIXES}• ${line}\n"
          elif echo "$line" | grep -qiE '^(improve|优化|refactor|重构|perf|改进|改善)'; then
            IMPROVEMENTS="${IMPROVEMENTS}• ${line}\n"
          else
            OTHERS="${OTHERS}• ${line}\n"
          fi
        done <<< "$COMMITS"
        
        echo "FEATURES<<EOF" >> $GITHUB_OUTPUT
        echo -e "$FEATURES" >> $GITHUB_OUTPUT
        echo "EOF" >> $GITHUB_OUTPUT
        
        echo "FIXES<<EOF" >> $GITHUB_OUTPUT
        echo -e "$FIXES" >> $GITHUB_OUTPUT
        echo "EOF" >> $GITHUB_OUTPUT
        
        echo "IMPROVEMENTS<<EOF" >> $GITHUB_OUTPUT
        echo -e "$IMPROVEMENTS" >> $GITHUB_OUTPUT
        echo "EOF" >> $GITHUB_OUTPUT
        
        echo "OTHERS<<EOF" >> $GITHUB_OUTPUT
        echo -e "$OTHERS" >> $GITHUB_OUTPUT
        echo "EOF" >> $GITHUB_OUTPUT
      env:
        GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    
    - name: Get closed issues and PRs
      id: github_data
      uses: actions/github-script@v7
      with:
        script: |
          const sinceDate = new Date(Date.now() - 30 * 24 * 60 * 60 * 1000).toISOString();
          
          console.log(`Fetching issues since: ${sinceDate}`);
          
          const { data: closedIssues } = await github.rest.issues.listForRepo({
            owner: context.repo.owner,
            repo: context.repo.repo,
            state: 'closed',
            since: sinceDate,
            per_page: 100
          });
          
          const resolvedIssues = closedIssues.filter(i => !i.pull_request && i.state_reason === 'completed');
          const mergedPRs = closedIssues.filter(i => i.pull_request);
          
          console.log(`Found ${resolvedIssues.length} resolved issues and ${mergedPRs.length} merged PRs`);
          
          return {
            resolvedIssues: resolvedIssues.map(i => ({
              number: i.number,
              title: i.title,
              url: i.html_url
            })),
            mergedPRs: mergedPRs.map(pr => ({
              number: pr.number,
              title: pr.title,
              url: pr.html_url
            }))
          };
    
    - name: Build release body
      id: build_body
      run: |
        cat > release_body.md << 'EOF'
        ## 📝 更新日志
        
        EOF
        
        if [ -n "${{ steps.changelog.outputs.FEATURES }}" ]; then
          echo "### 🎀 新功能" >> release_body.md
          echo -e "${{ steps.changelog.outputs.FEATURES }}" >> release_body.md
          echo "" >> release_body.md
        fi
        
        if [ -n "${{ steps.changelog.outputs.FIXES }}" ]; then
          echo "### 🔧 问题修复" >> release_body.md
          echo -e "${{ steps.changelog.outputs.FIXES }}" >> release_body.md
          echo "" >> release_body.md
        fi
        
        if [ -n "${{ steps.changelog.outputs.IMPROVEMENTS }}" ]; then
          echo "### ⚡ 优化改进" >> release_body.md
          echo -e "${{ steps.changelog.outputs.IMPROVEMENTS }}" >> release_body.md
          echo "" >> release_body.md
        fi
        
        if [ -n "${{ steps.changelog.outputs.OTHERS }}" ]; then
          echo "### 📌 其他变更" >> release_body.md
          echo -e "${{ steps.changelog.outputs.OTHERS }}" >> release_body.md
          echo "" >> release_body.md
        fi
        
        echo '${{ steps.github_data.outputs.result }}' > github_data.json
        
        if [ -f github_data.json ] && [ -s github_data.json ] && command -v jq &> /dev/null; then
          ISSUES_COUNT=$(jq '.resolvedIssues | length' github_data.json 2>/dev/null || echo "0")
          PRS_COUNT=$(jq '.mergedPRs | length' github_data.json 2>/dev/null || echo "0")
          
          echo "## 📊 项目动态" >> release_body.md
          echo "" >> release_body.md
          
          echo "| 类型 | 数量 |" >> release_body.md
          echo "|------|------|" >> release_body.md
          echo "| 🎯 已解决的 Issue | ${ISSUES_COUNT} |" >> release_body.md
          echo "| 🔀 已合并的 PR | ${PRS_COUNT} |" >> release_body.md
          
          if [ "$ISSUES_COUNT" -gt 0 ]; then
            echo "" >> release_body.md
            echo "<details>" >> release_body.md
            echo "<summary>🎯 解决的 Issue</summary>" >> release_body.md
            echo "" >> release_body.md
            jq -r '.resolvedIssues[] | "• [#\(.number)](\(.url)) \(.title)"' github_data.json >> release_body.md
            echo "</details>" >> release_body.md
          fi
          
          if [ "$PRS_COUNT" -gt 0 ]; then
            echo "" >> release_body.md
            echo "<details>" >> release_body.md
            echo "<summary>🔀 合并的 PR</summary>" >> release_body.md
            echo "" >> release_body.md
            jq -r '.mergedPRs[] | "• [#\(.number)](\(.url)) \(.title)"' github_data.json >> release_body.md
            echo "</details>" >> release_body.md
          fi
        fi
        
        cat >> release_body.md << 'EOF'
        
        ---
        
        <p align="center">
          <sub>💖 感谢使用 | <a href="https://github.com/${{ github.repository }}/issues">问题反馈</a></sub>
        </p>
        EOF
        
        CONTENT=$(cat release_body.md)
        echo "body<<EOF" >> $GITHUB_OUTPUT
        echo "$CONTENT" >> $GITHUB_OUTPUT
        echo "EOF" >> $GITHUB_OUTPUT
    
    - name: Create Release
      uses: softprops/action-gh-release@v2
      with:
        tag_name: ${{ steps.get_version.outputs.version }}
        name: ${{ steps.release_title.outputs.title }}
        body: ${{ steps.build_body.outputs.body }}
        files: ${{ steps.find_jar.outputs.jar_path }}
        draft: false
        prerelease: false
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    
    - name: Upload JAR as artifact
      uses: actions/upload-artifact@v4
      with:
        name: ${{ steps.find_jar.outputs.jar_file }}
        path: ${{ steps.find_jar.outputs.jar_path }}
